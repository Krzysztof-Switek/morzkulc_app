<script>
window.UI = window.UI || {};

UI.Actions = {

  rent(id) {
    const user = prompt("Kto wypożycza ten kajak?");
    if (!user) return;

    UI.Helpers.updateStatus(`Wypożyczanie kajaka #${id} dla ${user}...`);

    google.script.run
      .withSuccessHandler(() => UI.List.loadKayaks())
      .withFailureHandler(err => alert("Błąd: " + err.message))
      .rentKayak(id, user, "", "");
  },

  return(id) {
    if (!confirm("Zwrócić kajak #" + id + "?")) return;

    UI.Helpers.updateStatus(`Zwracanie kajaka #${id}...`);

    google.script.run
      .withSuccessHandler(() => UI.List.loadKayaks())
      .withFailureHandler(err => alert("Błąd: " + err.message))
      .returnKayak(id);
  }
};
</script>
