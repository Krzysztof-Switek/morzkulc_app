<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <title>SKK Morzkulc - sprzęt</title>

      <style>
    :root {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      --bg: #0f172a;
      --card-bg: #111827;
      --card-border: #1f2937;
      --accent: #22c55e;
      --accent-soft: rgba(34, 197, 94, 0.1);
      --danger: #ef4444;
      --danger-soft: rgba(239, 68, 68, 0.1);
      --muted: #9ca3af;
      --text: #e5e7eb;
      --text-strong: #f9fafb;
      --badge-bg: #1f2937;
      --badge-border: #374151;
      --radius-lg: 18px;
      --radius-md: 12px;
      --radius-sm: 999px;
      --shadow-soft: 0 18px 40px rgba(15, 23, 42, 0.7);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at top, #1f2937 0, #020617 55%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .app-shell {
      max-width: 960px;
      margin: 0 auto;
      padding: 16px clamp(12px, 3vw, 24px) 32px;
    }

    header.app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .app-title {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .app-title h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 600;
      color: var(--text-strong);
      letter-spacing: 0.02em;
    }

    .app-title span {
      font-size: 12px;
      color: var(--muted);
    }

    .pill {
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.4);
      font-size: 11px;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .pill-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.25);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filter-group {
      display: inline-flex;
      background: rgba(15, 23, 42, 0.9);
      border-radius: 999px;
      padding: 3px;
      border: 1px solid rgba(51, 65, 85, 0.8);
    }

    .filter-btn {
      border: none;
      background: transparent;
      color: var(--muted);
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.12s ease-out;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .filter-btn.active {
      background: #0f172a;
      color: var(--text-strong);
      box-shadow: 0 0 0 1px rgba(148, 163, 184, 0.8);
    }

    .filter-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--accent);
    }

    .toolbar-spacer {
      flex: 1;
    }

    .refresh-btn {
      border: none;
      background: rgba(15, 23, 42, 0.9);
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--muted);
      font-size: 12px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      border: 1px solid rgba(55, 65, 81, 0.8);
      transition: all 0.12s ease-out;
    }

    .refresh-btn:hover {
      color: var(--text-strong);
      border-color: rgba(148, 163, 184, 0.9);
      background: rgba(15, 23, 42, 0.95);
    }

    .refresh-icon {
      width: 13px;
      height: 13px;
      border-radius: 999px;
      border: 2px solid var(--muted);
      border-top-color: transparent;
      border-right-color: transparent;
      transform: rotate(-45deg);
    }

    .content {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .status-line {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 0 2px;
    }

    .cards-grid {
      margin-top: 4px;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 10px;
    }

    @media (min-width: 720px) {
      .cards-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    .gear-card {
      position: relative;
      background: radial-gradient(circle at top left, #111827 0, #020617 75%);
      border-radius: var(--radius-lg);
      padding: 12px 12px 10px;
      border: 1px solid var(--card-border);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.85);
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow: hidden;
    }

    .gear-main {
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .gear-title-block {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .gear-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-strong);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .gear-subtitle {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(17, 24, 39, 0.9);
      border: 1px solid var(--badge-border);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }

    .badge.basen {
      border-color: rgba(59, 130, 246, 0.8);
      color: #bfdbfe;
    }

    .badge.private {
      border-color: rgba(251, 191, 36, 0.8);
      color: #facc15;
    }

    .status-chip {
      align-self: flex-start;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 11px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
    }

    .status-free {
      background: var(--accent-soft);
      color: #bbf7d0;
      border-color: rgba(34, 197, 94, 0.8);
    }

    .status-free .status-dot {
      background: var(--accent);
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
    }

    .status-busy {
      background: var(--danger-soft);
      color: #fecaca;
      border-color: rgba(239, 68, 68, 0.8);
    }

    .status-busy .status-dot {
      background: var(--danger);
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.2);
    }

    .status-broken {
      background: rgba(148, 163, 184, 0.15);
      color: #e5e7eb;
      border-color: rgba(148, 163, 184, 0.8);
    }

    .status-broken .status-dot {
      background: #9ca3af;
      box-shadow: 0 0 0 3px rgba(148, 163, 184, 0.2);
    }

    .gear-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 2px;
      font-size: 11px;
      color: var(--muted);
    }

    .meta-chip {
      padding: 2px 7px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(31, 41, 55, 0.9);
    }

    .card-footer {
      margin-top: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .user-info {
      font-size: 11px;
      color: var(--muted);
      max-width: 60%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      transition: all 0.1s ease-out;
    }

    .btn-primary {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #022c22;
      font-weight: 600;
      box-shadow: 0 8px 18px rgba(22, 163, 74, 0.4);
    }

    .btn-primary:hover {
      filter: brightness(1.05);
      box-shadow: 0 10px 22px rgba(22, 163, 74, 0.55);
      transform: translateY(-1px);
    }

    .btn-outline {
      background: transparent;
      color: #fecaca;
      border: 1px solid rgba(239, 68, 68, 0.8);
    }

    .btn-outline:hover {
      background: rgba(239, 68, 68, 0.12);
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: default;
      box-shadow: none;
      transform: none;
    }

    .icon {
      font-size: 14px;
    }

    .helper-text {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      padding: 0 2px;
    }

    .empty-state {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 40px 12px 12px;
    }

    .loader {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      border: 2px solid rgba(148, 163, 184, 0.4);
      border-top-color: #e5e7eb;
      animation: spin 0.8s linear infinite;
    }

    .loading-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 20px 0;
      font-size: 13px;
      color: var(--muted);
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
