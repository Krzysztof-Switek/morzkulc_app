<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SKK Morzkulc</title>

  <link rel="stylesheet" href="/styles/app.css" />
</head>
<body>
  <header>
    <div class="headerRow">
      <h1>SKK Morzkulc</h1>
      <div class="headerActions">
        <button id="themeToggle" class="iconBtn ghost" type="button" aria-label="Przełącz motyw">☀️</button>
        <button id="loginBtn" type="button">Zaloguj przez Google</button>
        <button id="logoutBtn" class="hidden" type="button">Wyloguj</button>
      </div>
    </div>
  </header>

  <!-- UWAGA: app_shell.js oczekuje appRoot -->
  <div id="appRoot" class="hidden">
    <div id="nav"></div>
    <div id="view"></div>
  </div>

  <details id="debugPanel" open>
    <summary>Debug</summary>
    <p class="muted">Sekcja do testów.</p>

    <h3>Auth user</h3>
    <pre id="userData"></pre>

    <h3>Register result</h3>
    <pre id="registerData"></pre>

    <h3>Modules result</h3>
    <pre id="modulesData"></pre>
  </details>

  <!-- Theme (UI only) -->
  <script type="module" src="/core/theme.js"></script>

  <!-- App entrypoint -->
  <script type="module" src="/core/app_shell.js"></script>
</body>
</html>
