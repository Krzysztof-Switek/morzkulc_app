<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Morzkulc – logowanie (REDIRECT v2)</title>

  <style>
    :root{
      --bg0:#070b18;
      --bg1:#0b1020;
      --card:#121a36;
      --card2:#0f1630;
      --border:rgba(255,255,255,.10);
      --border2:rgba(255,255,255,.16);
      --text:#ffffff;
      --muted:rgba(255,255,255,.72);
      --muted2:rgba(255,255,255,.60);
      --accent:#1ea7ff;
      --accent2:#0d8cff;
      --danger:#ff4d6d;
      --shadow: 0 20px 70px rgba(0,0,0,.35);
      --radius: 18px;
      --radius2: 14px;
      --pad: 18px;
      --pad2: 14px;
      --max: 520px;
      --font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background: radial-gradient(circle at top, #141a26 0, var(--bg1) 55%, var(--bg0) 100%);
      font-family:var(--font);
      color:var(--text);
      padding:24px;
    }

    .wrap{
      width:100%;
      max-width:var(--max);
    }

    .box{
      width:100%;
      border:1px solid var(--border);
      border-radius:var(--radius);
      background: linear-gradient(180deg, rgba(18,26,54,.85), rgba(10,14,30,.85));
      box-shadow: var(--shadow);
      overflow:hidden;
    }

    .boxInner{
      padding: 20px;
      background: linear-gradient(180deg, rgba(18,26,54,.88), rgba(12,18,40,.88));
      backdrop-filter: blur(10px);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom: 10px;
    }

    .logoDot{
      width:14px;
      height:14px;
      border-radius:50%;
      background: radial-gradient(circle at 30% 30%, #64d2ff, #1ea7ff 55%, #0b5aa1);
      box-shadow: 0 0 0 4px rgba(30,167,255,.10);
      flex:0 0 auto;
    }

    h1{
      margin:0;
      font-size:18px;
      letter-spacing:.2px;
    }
    p{
      margin:6px 0 0;
      color:var(--muted);
      font-size:13.5px;
      line-height:1.35;
    }

    .muted{ color: var(--muted2); }

    .rowButtons{
      display:flex;
      gap:10px;
      margin-top:14px;
      flex-wrap:wrap;
    }

    button{
      appearance:none;
      border:1px solid var(--border2);
      background: rgba(255,255,255,.06);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 12px;
      font-weight:600;
      cursor:pointer;
      transition: transform .05s ease, background .2s ease, border-color .2s ease;
      min-width: 140px;
    }
    button:hover{ background: rgba(255,255,255,.10); border-color: rgba(255,255,255,.26); }
    button:active{ transform: scale(.99); }
    button.primary{
      background: linear-gradient(180deg, var(--accent), var(--accent2));
      border-color: transparent;
      color:#03121f;
    }
    button.primary:hover{ filter: brightness(1.03); }

    button:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .loaderWrap{
      margin-top: 14px;
      display:none;
    }
    .loaderRow{
      display:flex;
      gap:12px;
      align-items:center;
    }
    .spinner{
      width:18px;height:18px;
      border-radius:50%;
      border: 2px solid rgba(255,255,255,.22);
      border-top-color: rgba(255,255,255,.85);
      animation: spin 1.0s linear infinite;
      flex:0 0 auto;
    }
    @keyframes spin{ to{ transform: rotate(360deg); } }

    .bar{
      height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,.10);
      overflow:hidden;
      margin-top: 12px;
    }
    .bar i{
      display:block;
      height:100%;
      width:35%;
      background: linear-gradient(90deg, transparent, rgba(30,167,255,.65), transparent);
      animation: bar 1.1s ease-in-out infinite;
    }
    @keyframes bar{
      0%{ transform: translateX(-120%); }
      100%{ transform: translateX(360%); }
    }

    .errBox{
      display:none;
      margin-top:12px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,77,109,.35);
      background: rgba(255,77,109,.10);
      color: #ffd0d9;
      font-size:13px;
      line-height:1.35;
      white-space: pre-wrap;
    }

    .sectionTitle{
      margin-top: 12px;
      font-size: 13px;
      color: rgba(255,255,255,.82);
      font-weight: 700;
      letter-spacing: .2px;
    }

    .field{
      margin-top: 10px;
    }
    label{
      display:block;
      font-size: 12.5px;
      color: rgba(255,255,255,.78);
      margin-bottom: 6px;
      font-weight: 650;
      letter-spacing:.1px;
    }
    input{
      width:100%;
      padding: 10px 12px;
      border-radius: 12px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color: var(--text);
      outline:none;
      font-size: 14px;
    }
    input:focus{
      border-color: rgba(30,167,255,.45);
      box-shadow: 0 0 0 4px rgba(30,167,255,.10);
    }

    .errField{
      margin-top:6px;
      font-size:12px;
      color: rgba(255,77,109,.95);
      min-height: 14px;
    }
    .field.invalid input{
      border-color: rgba(255,77,109,.55);
      box-shadow: 0 0 0 4px rgba(255,77,109,.10);
    }

    .small{
      font-size: 12px;
      color: rgba(255,255,255,.68);
      margin-top: 10px;
      line-height:1.35;
    }

    .hr{
      height:1px;
      background: rgba(255,255,255,.10);
      margin: 14px 0 10px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="box">
      <div class="boxInner" id="app"></div>
    </div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth,
    setPersistence,
    browserLocalPersistence,
    GoogleAuthProvider,
    signInWithRedirect,
    onAuthStateChanged,
    signOut
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore,
    doc,
    getDoc,
    setDoc,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  /********************
   * CONFIG
   ********************/
  const firebaseConfig = {
    apiKey: "AIzaSyCzWcAgskiyp1AyibbiPLeAfCUfr7e3gtg",
    authDomain: "sprzet-skk-morzkulc.web.app",
    projectId: "sprzet-skk-morzkulc",
    storageBucket: "sprzet-skk-morzkulc.firebasestorage.app",
    messagingSenderId: "273912496654",
    appId: "1:273912496654:web:38246f0f0c6ea5d459b25f"
  };

  const APPS_SCRIPT_API =
    "https://script.google.com/macros/s/AKfycbzQg80NHd4oJNCKHN6g-yaKn1IHqOwlLXXDbUgiNYJ3YPXTMaP9o3-aC9ByleKUQ3yzfw/exec";

  /********************
   * INIT
   ********************/
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const appDiv = document.getElementById("app");

  let lastAuthError = "";

  /********************
   * HELPERS
   ********************/
  function esc(s) {
    return String(s ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function setBusy(isBusy, msg) {
    const loader = document.getElementById("loaderWrap");
    const busyTxt = document.getElementById("busyText");
    if (!loader || !busyTxt) return;
    loader.style.display = isBusy ? "block" : "none";
    if (msg) busyTxt.textContent = msg;
  }

  function disableAllButtons(disabled) {
    document.querySelectorAll("button").forEach(b => b.disabled = !!disabled);
  }

  function setError(message) {
    const wrap = document.getElementById("errBox");
    const err = document.getElementById("errText");
    if (!wrap || !err) return;
    if (message) {
      wrap.style.display = "block";
      err.textContent = message;
    } else {
      wrap.style.display = "none";
      err.textContent = "";
    }
  }

  function setFieldError(fieldId, message) {
    const wrap = document.getElementById(fieldId + "_field");
    const err  = document.getElementById(fieldId + "_err");
    if (!wrap || !err) return;
    if (message) {
      wrap.classList.add("invalid");
      err.textContent = message;
    } else {
      wrap.classList.remove("invalid");
      err.textContent = "";
    }
  }

  function clearFieldErrors() {
    ["imie","nazwisko","telefon"].forEach(id => setFieldError(id, ""));
  }

  function normalizePhone(s) {
    return String(s || "").replace(/[^\d+]/g, "").trim();
  }

  function normEmail(s) {
    return String(s || "").trim().toLowerCase();
  }

  // ✅ bez headers => brak CORS preflight na Apps Script
  async function postToAppsScript(action, payload) {
    const url = APPS_SCRIPT_API + "?action=" + encodeURIComponent(action);
    const res = await fetch(url, {
      method: "POST",
      cache: "no-store",
      body: JSON.stringify(payload)
    });

    const text = await res.text();
    if (!res.ok) throw new Error("HTTP " + res.status + ": " + text);

    try { return JSON.parse(text); } catch (_) { return text; }
  }

  /********************
   * UI
   ********************/
  function shell(title, subtitle, innerHtml) {
    appDiv.innerHTML = `
      <div class="brand">
        <div class="logoDot"></div>
        <div>
          <h1>${esc(title)}</h1>
          <p>${esc(subtitle || "")}</p>
        </div>
      </div>

      <div id="errBox" class="errBox"><div id="errText"></div></div>

      ${innerHtml || ""}

      <div class="loaderWrap" id="loaderWrap">
        <div class="loaderRow">
          <div class="spinner"></div>
          <div class="muted" id="busyText">Proszę czekać…</div>
        </div>
        <div class="bar"><i></i></div>
      </div>
    `;
  }

  function renderLogin(message) {
    shell(
      "Logowanie",
      "Zaloguj się kontem Google (Workspace).",
      `
        <div class="sectionTitle">Akcje</div>
        <div class="rowButtons">
          <button class="primary" id="loginBtn">Zaloguj</button>
        </div>
        <div class="small muted">Po zalogowaniu sprawdzimy konto i ewentualnie poprosimy o rejestrację.</div>
      `
    );

    if (message) setError(message);
    if (lastAuthError) {
      setError(lastAuthError);
      lastAuthError = "";
    }

    document.getElementById("loginBtn").onclick = async () => {
      try {
        setError("");

        try {
          await setPersistence(auth, browserLocalPersistence);
        } catch (e) {
          console.warn("[AUTH] setPersistence failed:", e);
        }

        const provider = new GoogleAuthProvider();
        provider.setCustomParameters({ prompt: "select_account" });

        signInWithRedirect(auth, provider);
      } catch (e) {
        setError("Błąd logowania: " + (e?.message || e));
      }
    };
  }

  function renderHome(data) {
    shell(
      "Witaj " + (data.imie || data.ksywa || data.email || "użytkowniku"),
      "Status konta i dostęp do zasobów.",
      `
        <div class="sectionTitle">Informacje</div>
        <p class="muted">Rola: <b>${esc(data.rola || data.role || "pending")}</b></p>
        <p class="muted">Status: <b>${esc(data.status || "")}</b></p>

        <div class="rowButtons">
          <button class="primary" id="logoutBtn">Wyloguj</button>
        </div>
      `
    );

    document.getElementById("logoutBtn").onclick = () => signOut(auth);
  }

  function renderRegister(user) {
    shell(
      "Rejestracja",
      "Uzupełnij dane, aby aktywować konto.",
      `
        <form id="regForm" autocomplete="on">
          <div class="field" id="imie_field">
            <label for="imie">Imię</label>
            <input id="imie" name="imie" autocomplete="given-name" autocapitalize="words" />
            <div class="errField" id="imie_err"></div>
          </div>

          <div class="field" id="nazwisko_field">
            <label for="nazwisko">Nazwisko</label>
            <input id="nazwisko" name="nazwisko" autocomplete="family-name" autocapitalize="words" />
            <div class="errField" id="nazwisko_err"></div>
          </div>

          <div class="field">
            <label for="ksywa">Ksywa (opcjonalnie)</label>
            <input id="ksywa" name="ksywa" />
          </div>

          <div class="field" id="telefon_field">
            <label for="telefon">Telefon</label>
            <input id="telefon" name="telefon" autocomplete="tel" inputmode="tel" />
            <div class="errField" id="telefon_err"></div>
          </div>

          <div class="hr"></div>

          <div class="muted small">E-mail: <b>${esc(user.email || "")}</b></div>

          <div class="rowButtons">
            <button class="primary" type="submit">Zarejestruj konto</button>
            <button type="button" id="logoutBtn">Wyloguj</button>
          </div>
        </form>
      `
    );

    document.getElementById("logoutBtn").onclick = () => signOut(auth);

    const form = document.getElementById("regForm");
    const imieEl = document.getElementById("imie");
    const nazwEl = document.getElementById("nazwisko");
    const telEl  = document.getElementById("telefon");

    imieEl.addEventListener("input", () => setFieldError("imie",""));
    nazwEl.addEventListener("input", () => setFieldError("nazwisko",""));
    telEl.addEventListener("input", () => setFieldError("telefon",""));

    form.addEventListener("submit", async (ev) => {
      ev.preventDefault();
      setError("");
      clearFieldErrors();

      const imie = imieEl.value.trim();
      const nazwisko = nazwEl.value.trim();
      const ksywa = document.getElementById("ksywa").value.trim();
      const telefonRaw = telEl.value.trim();
      const telefon = normalizePhone(telefonRaw);

      let ok = true;
      if (!imie) { setFieldError("imie", "To pole jest wymagane."); ok = false; }
      if (!nazwisko) { setFieldError("nazwisko", "To pole jest wymagane."); ok = false; }
      if (!telefon) { setFieldError("telefon", "To pole jest wymagane."); ok = false; }
      if (!ok) return;

      const idToken = await user.getIdToken(true);

      const payload = {
        idToken: idToken,
        email: user.email,
        imie,
        nazwisko,
        ksywa,
        telefon,
        createdAtIso: new Date().toISOString()
      };

      setBusy(true, "Rejestruję konto…");
      disableAllButtons(true);

      try {
        const apiRes = await postToAppsScript("register_from_firebase", payload);
        if (!apiRes || apiRes.ok !== true) {
          throw new Error("API register_from_firebase failed: " + JSON.stringify(apiRes));
        }
        if (!apiRes.user) {
          throw new Error("API did not return 'user' object: " + JSON.stringify(apiRes));
        }

        const userDoc = apiRes.user;

        // ✅ JEDEN KLUCZ PRAWDY: users/{email}
        const emailKey = normEmail(user.email);
        await setDoc(doc(db, "users", emailKey), {
          ...userDoc,
          createdAt: serverTimestamp()
        });

        renderHome(userDoc);
      } catch (e) {
        setError("Błąd rejestracji: " + (e?.message || e));
      } finally {
        disableAllButtons(false);
        setBusy(false);
      }
    });
  }

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      renderLogin();
      return;
    }

    appDiv.innerHTML = `
      <div class="boxInner">
        <div class="brand">
          <div class="logoDot"></div>
          <div>
            <h1>Ładowanie</h1>
            <p class="muted">Sprawdzam konto…</p>
          </div>
        </div>

        <div class="loaderWrap" style="display:block">
          <div class="loaderRow">
            <div class="spinner"></div>
            <div class="muted" id="busyText">Proszę czekać…</div>
          </div>
          <div class="bar"><i></i></div>
        </div>

        <div id="errBox" class="errBox"><div id="errText"></div></div>
      </div>
    `;

    try {
      const emailKey = normEmail(user.email);
      const ref = doc(db, "users", emailKey);
      const snap = await getDoc(ref);

      if (!snap.exists()) {
        renderRegister(user);
      } else {
        renderHome(snap.data());
      }
    } catch (e) {
      renderHome({ email: user.email, rola: "Sympatyk", status: "pending" });
      const errBox = document.getElementById("errBox");
      if (errBox) {
        errBox.style.display = "block";
        errBox.textContent = "Błąd odczytu profilu: " + (e?.message || e);
      }
    }
  });

  window.addEventListener("error", function (e) {
    try {
      const msg = e && e.message ? e.message : String(e);
      setError("Błąd JS: " + msg);
    } catch (_) {}
  });
</script>
</body>
</html>
