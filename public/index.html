<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SKK Morzkulc</title>

  <!-- PWA: manifest i ikony -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16.png" />
  <link rel="apple-touch-icon" href="/icons/icon-180.png" />

  <!-- PWA: meta dla iOS / Android -->
  <meta name="theme-color" content="#0b0f17" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Morzkulc" />
  <meta name="description" content="Aplikacja SKK Morzkulc — sprzęt, rezerwacje, godzinki." />

  <link rel="stylesheet" href="/styles/app.css?v=3" />
</head>
<body>
  <header>
    <div class="headerRow">
      <h1>SKK Morzkulc</h1>
      <div class="headerActions">
        <button id="themeToggle" class="iconBtn ghost" type="button" aria-label="Przełącz motyw">☀️</button>
        <button id="profileBtn" class="iconBtn ghost hidden" type="button" aria-label="Profil użytkownika">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
        <button id="loginBtn" type="button">Zaloguj</button>
        <button id="logoutBtn" class="hidden" type="button">Wyloguj</button>
      </div>
    </div>
  </header>

  <!-- UWAGA: app_shell.js oczekuje appRoot -->
  <div id="appRoot" class="hidden">
    <div id="nav"></div>
    <div id="view"></div>
  </div>

  <!-- Theme (UI only) -->
  <script type="module" src="/core/theme.js"></script>

  <!-- App entrypoint -->
  <script type="module" src="/core/app_shell.js"></script>
</body>
</html>
