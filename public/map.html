<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa aktywności — SKK Morzkulc</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg: #0d1117;
      --panel-bg: rgba(13,17,23,0.85);
      --panel-border: #333;
      --text: #888;
      --text-dim: #555;
      --input-bg: #1e1e2e;
      --input-color: #e0e0e0;
      --input-border: #444;
      --status-color: #666;
    }
    body.light {
      --bg: #f0f0eb;
      --panel-bg: rgba(240,240,235,0.92);
      --panel-border: #bbb;
      --text: #555;
      --text-dim: #aaa;
      --input-bg: #fff;
      --input-color: #222;
      --input-border: #bbb;
      --status-color: #999;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: var(--bg); overflow: hidden; transition: background 0.2s; }
    #map { width: 100%; height: 100%; }

    #yearBar {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      padding: 5px 12px;
      backdrop-filter: blur(6px);
    }
    #yearBar label { font: 12px system-ui, sans-serif; color: var(--text); }
    #yearFilter {
      background: var(--input-bg);
      color: var(--input-color);
      border: 1px solid var(--input-border);
      border-radius: 5px;
      padding: 3px 8px;
      font: 12px system-ui, sans-serif;
    }

    #themeToggle {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 1000;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      backdrop-filter: blur(6px);
    }

    #legend {
      position: fixed;
      bottom: 32px;
      left: 10px;
      z-index: 1000;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      padding: 8px 12px;
      backdrop-filter: blur(6px);
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font: 11px system-ui, sans-serif;
      color: var(--text);
    }
    .legend-dot {
      border-radius: 50%;
      opacity: 0.75;
      flex-shrink: 0;
    }

    #status {
      position: fixed;
      bottom: 8px;
      right: 10px;
      font: 11px/1.4 system-ui, sans-serif;
      color: var(--status-color);
      pointer-events: none;
      z-index: 1000;
    }

    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      font: 14px system-ui, sans-serif;
      z-index: 2000;
      flex-direction: column;
      gap: 12px;
      text-align: center;
      padding: 24px;
    }
    #overlay.hidden { display: none; }

    #mapBackBtn {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1100;
      background: var(--panel-bg, rgba(13,17,23,0.85));
      color: var(--input-color, #e0e0e0);
      border: 1px solid var(--panel-border, #333);
      border-radius: 20px;
      padding: 10px 22px;
      font: 600 14px system-ui, sans-serif;
      cursor: pointer;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    #mapBackBtn:active { opacity: 0.7; }
  </style>
</head>
<body>
  <div id="overlay">Ładowanie mapy…</div>
  <button id="mapBackBtn" type="button">← Wróć do aplikacji</button>
  <script>
    (function() {
      const isStandalone = window.matchMedia("(display-mode: standalone)").matches ||
        window.navigator.standalone === true;
      if (isStandalone) {
        const btn = document.getElementById("mapBackBtn");
        if (btn) {
          btn.style.display = "block";
          btn.addEventListener("click", () => history.back());
        }
      }
    })();
  </script>
  <div id="yearBar">
    <label for="yearFilter">Rok:</label>
    <select id="yearFilter"><option value="">Wszystkie lata</option></select>
  </div>
  <button id="themeToggle" title="Przełącz motyw">☀️</button>
  <div id="map"></div>
  <div id="legend">
    <div class="legend-row">
      <div class="legend-dot" style="width:10px;height:10px;background:#00bcd4;"></div>
      <span>mało spływów</span>
    </div>
    <div class="legend-row">
      <div class="legend-dot" style="width:22px;height:22px;background:#00bcd4;"></div>
      <span>dużo spływów</span>
    </div>
    <div class="legend-row" style="color:var(--text-dim);margin-top:2px;">
      Kliknij kółko, by sprawdzić
    </div>
  </div>
  <div id="status"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const TILE_DARK  = "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png";
    const TILE_LIGHT = "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png";
    const TILE_ATTR  = "© <a href='https://www.openstreetmap.org/copyright'>OpenStreetMap</a> contributors © <a href='https://carto.com/'>CARTO</a>";
    const MARKER_DARK  = "#00bcd4";
    const MARKER_LIGHT = "#0077cc";

    let darkMode   = true;
    let leafletMap = null;
    let tileLayer  = null;
    let allLocations = [];

    const overlayEl     = document.getElementById("overlay");
    const yearSel       = document.getElementById("yearFilter");
    const statusEl      = document.getElementById("status");
    const themeBtn      = document.getElementById("themeToggle");
    const legendDots    = document.querySelectorAll(".legend-dot");

    function markerColor() { return darkMode ? MARKER_DARK : MARKER_LIGHT; }

    function updateLegendDots() {
      legendDots.forEach(d => { d.style.background = markerColor(); });
    }

    function esc(s) {
      return String(s ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function buildPopup(loc) {
      const cnt = loc.logCount;
      const word = cnt === 1 ? "wpis" : cnt < 5 ? "wpisy" : "wpisów";
      const users = loc.topUsers || [];
      const usersHtml = users.length
        ? `<br><span style="color:#aaa;font-size:0.85em">Ostatnio: ${users.map(u => esc(u.name)).join(", ")}</span>`
        : "";
      return `<strong>${esc(loc.placeName)}</strong><br>${cnt} ${word}${usersHtml}`;
    }

    function currentlyVisible() {
      const yr = parseInt(yearSel.value, 10);
      return isNaN(yr)
        ? allLocations
        : allLocations.filter(l => Array.isArray(l.yearsActive) && l.yearsActive.includes(yr));
    }

    function renderMarkers(locations) {
      if (!leafletMap) return;
      leafletMap.eachLayer(l => { if (l instanceof L.CircleMarker) leafletMap.removeLayer(l); });
      const color = markerColor();
      const markers = [];
      for (const loc of locations) {
        const radius = Math.min(6 + Math.log2(loc.logCount + 1) * 3, 22);
        const marker = L.circleMarker([loc.lat, loc.lng], {
          radius,
          color,
          fillColor: color,
          fillOpacity: 0.65,
          weight: 1.5,
        });
        marker.bindPopup(buildPopup(loc));
        marker.addTo(leafletMap);
        markers.push(marker);
      }
      if (markers.length) {
        leafletMap.fitBounds(L.featureGroup(markers).getBounds().pad(0.12));
      }
    }

    yearSel.addEventListener("change", () => renderMarkers(currentlyVisible()));

    themeBtn.addEventListener("click", () => {
      darkMode = !darkMode;
      document.body.classList.toggle("light", !darkMode);
      themeBtn.textContent = darkMode ? "☀️" : "🌙";
      updateLegendDots();

      if (tileLayer && leafletMap) {
        leafletMap.removeLayer(tileLayer);
        tileLayer = L.tileLayer(darkMode ? TILE_DARK : TILE_LIGHT, {
          attribution: TILE_ATTR,
          subdomains: "abcd",
          maxZoom: 19,
        }).addTo(leafletMap);
      }

      renderMarkers(currentlyVisible());
    });

    async function initMap() {
      try {
        const resp = await fetch("/api/km/map-data");
        if (!resp.ok) throw new Error("HTTP " + resp.status);
        const data = await resp.json();

        overlayEl.classList.add("hidden");

        allLocations = data?.locations || [];
        const years  = data?.years || [];

        leafletMap = L.map("map", { zoomControl: true, attributionControl: true });

        tileLayer = L.tileLayer(TILE_DARK, {
          attribution: TILE_ATTR,
          subdomains: "abcd",
          maxZoom: 19,
        }).addTo(leafletMap);

        if (allLocations.length === 0) {
          document.getElementById("map").innerHTML =
            "<div style='display:flex;align-items:center;justify-content:center;height:100%;color:#aaa;font:14px system-ui,sans-serif;padding:24px;text-align:center;'>Brak danych lokalizacji.<br>Mapa aktualizuje się po uruchomieniu zadania z menu w arkuszu.</div>";
          return;
        }

        for (const yr of years) {
          const opt = document.createElement("option");
          opt.value = String(yr);
          opt.textContent = String(yr);
          yearSel.appendChild(opt);
        }

        renderMarkers(allLocations);

        if (data.updatedAt) {
          const d = new Date(data.updatedAt);
          statusEl.textContent = "Aktualizacja: " + d.toLocaleDateString("pl-PL") + " " + d.toLocaleTimeString("pl-PL", { hour: "2-digit", minute: "2-digit" });
        }
      } catch (err) {
        overlayEl.textContent = "Błąd ładowania mapy: " + (err?.message || String(err));
      }
    }

    initMap();
  </script>
</body>
</html>
