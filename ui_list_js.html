<script>
window.UI = window.UI || {};

UI.List = {

  loadKayaks() {
    window.isLoading = true;
    UI.Helpers.updateStatus('Ładowanie danych z Firestore...');

    document.getElementById('cards').innerHTML = `
      <div class="loading-row">
        <div class="loader"></div>
        <span>Aktualizuję listę kajaków...</span>
      </div>
    `;

    google.script.run
      .withSuccessHandler(result => {
        window.isLoading = false;
        window.allKayaks = UI.List.sortKayaks(result || []);
        UI.List.renderKayaks();
      })
      .withFailureHandler(err => {
        window.isLoading = false;
        UI.Helpers.updateStatus('Błąd: ' + err.message);
      })
      .listKayaks();
  },

  sortKayaks(list) {
    return list.slice().sort((a, b) => {
      const pa = a.prywatny ? 1 : 0;
      const pb = b.prywatny ? 1 : 0;
      if (pa !== pb) return pa - pb;

      return (a.numerKajaka || '').toString()
        .localeCompare((b.numerKajaka || '').toString(), 'pl', { numeric: true });
    });
  },

  renderKayaks() {
    const cards = document.getElementById('cards');
    const all = window.allKayaks || [];

    let visible = all;
    if (window.currentFilter === 'available') {
      visible = all.filter(k => k.dostepny);
    }

    if (visible.length === 0) {
      cards.innerHTML = `
        <div class="empty-state">Brak danych dla wybranego filtra.</div>
      `;
      UI.Helpers.updateStatus('Brak kajaków.');
      return;
    }

    UI.Helpers.updateStatus(`Łącznie: ${all.length} • widzisz: ${visible.length}`);

    cards.innerHTML = visible.map(UI.List.renderCard).join('');
  },

  renderCard(k) {
    const isAvailable = k.dostepny === true;
    const isWorking = k.sprawny === true;
    const isPrivate = k.prywatny === true;

    // ============================================
    //  NOWOŚĆ: TRZY TYPY KOLORÓW OBWÓDKI
    //  - niesprawny → czerwony
    //  - sprawny + wolny → zielony
    //  - sprawny + wypożyczony → pomarańczowy
    // ============================================
    let cardClass = "gear-card";

    if (!isWorking) {
      cardClass += " gear-card-broken";       // czerwony
    } else if (!isAvailable) {
      cardClass += " gear-card-rented";       // 🟧 pomarańczowy
    } else {
      cardClass += " gear-card-ok";           // zielony
    }

    // --- prywatny zamiast statusu ---
    const privateBadge = isPrivate
      ? `<div class="status-chip status-private"><span>Prywatny</span></div>`
      : ``;

    const ownerInfo =
      isPrivate && k.privateOwnerEmail
        ? `Właściciel: ${UI.Helpers.escapeHtml(k.privateOwnerEmail)}`
        : '';

    const userInfo =
      !isWorking
        ? 'Do naprawy'
        : (
            isAvailable
              ? 'Dostępny'
              : (
                  k.aktualnyUzytkownik
                    ? 'Aktualnie: ' + UI.Helpers.escapeHtml(k.aktualnyUzytkownik)
                    : 'Wypożyczony'
                )
          );

    const typeBadge = k.typ
      ? `<span class="badge type-badge">${UI.Helpers.escapeHtml(k.typ)}</span>`
      : '';

    return `
      <article class="${cardClass}">
        <div class="gear-main">

          <div class="gear-title-block">
            <div class="gear-name">
              ${UI.Helpers.escapeHtml(k.producent)} ${UI.Helpers.escapeHtml(k.model)}
              <span class="gear-number">nr. ${UI.Helpers.escapeHtml(k.numerKajaka || '–')}</span>
            </div>
            <div class="gear-type">${typeBadge}</div>
          </div>

          ${privateBadge}

        </div>

        <div class="gear-meta" style="margin-top:6px;">
          ${ownerInfo ? `<span class="meta-chip">${ownerInfo}</span>` : ''}
        </div>

        <div class="card-footer">
          <div class="user-info">${userInfo}</div>

          ${
            (!isWorking)
              ? ''
              : (isAvailable
                  ? `<button class="btn btn-primary" onclick="UI.Actions.rent('${UI.Helpers.encodeId(k.id)}')">
                       <span class="icon">➕</span>Wypożycz
                     </button>`
                  : `<button class="btn btn-outline" onclick="UI.Actions.return('${UI.Helpers.encodeId(k.id)}')">
                       <span class="icon">↩</span>Zwróć
                     </button>`
                )
          }
        </div>
      </article>
    `;
  }

};
</script>
