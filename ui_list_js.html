<script>
window.UI = window.UI || {};

UI.List = {

  loadKayaks() {
    window.isLoading = true;
    UI.Helpers.updateStatus('Ładowanie danych z Firestore...');

    document.getElementById('cards').innerHTML = `
      <div class="loading-row">
        <div class="loader"></div>
        <span>Aktualizuję listę kajaków...</span>
      </div>
    `;

    google.script.run
      .withSuccessHandler(result => {
        window.isLoading = false;
        window.allKayaks = UI.List.sortKayaks(result || []);
        UI.List.renderKayaks();
      })
      .withFailureHandler(err => {
        window.isLoading = false;
        UI.Helpers.updateStatus('Błąd: ' + err.message);
      })
      .listKayaks();
  },

  sortKayaks(list) {
    return list.slice().sort((a, b) => {
      const pa = a.prywatny ? 1 : 0;
      const pb = b.prywatny ? 1 : 0;
      if (pa !== pb) return pa - pb;

      return (a.numerKajaka || '').toString()
        .localeCompare((b.numerKajaka || '').toString(), 'pl', { numeric: true });
    });
  },

  renderKayaks() {
    const cards = document.getElementById('cards');
    const all = window.allKayaks || [];

    let visible = all;
    if (window.currentFilter === 'available') {
      visible = all.filter(k => k.dostepny);
    }

    if (visible.length === 0) {
      cards.innerHTML = `
        <div class="empty-state">Brak danych dla wybranego filtra.</div>
      `;
      UI.Helpers.updateStatus('Brak kajaków.');
      return;
    }

    UI.Helpers.updateStatus(`Łącznie: ${all.length} • widzisz: ${visible.length}`);

    cards.innerHTML = visible.map(UI.List.renderCard).join('');
  },

  renderCard(k) {
    const isAvailable = k.dostepny === true;
    const isWorking = k.sprawny === true;
    const isPrivate = k.prywatny === true;

    let statusClass = 'status-free';
    let statusLabel = 'Dostępny';

    if (!isWorking) {
      statusClass = 'status-broken';
      statusLabel = 'Niesprawny';
    } else if (!isAvailable) {
      statusClass = 'status-busy';
      statusLabel = 'Wypożyczony';
    }

    const canRent =
      isAvailable && isWorking && (!isPrivate || k.privateAvailable === true);

    const rentLabel = isPrivate
      ? (k.privateAvailable ? 'Wypożycz (prywatny)' : 'Tylko za zgodą właściciela')
      : 'Wypożycz';

    const ownerInfo =
      isPrivate && k.privateOwnerEmail
        ? `Właściciel: ${UI.Helpers.escapeHtml(k.privateOwnerEmail)}`
        : '';

    const userInfo =
      !isAvailable && k.aktualnyUzytkownik
        ? 'Aktualnie: ' + UI.Helpers.escapeHtml(k.aktualnyUzytkownik)
        : (isAvailable ? 'Kajak wolny' : 'Wypożyczony');

    return `
      <article class="gear-card">
        <div class="gear-main">
          <div class="gear-title-block">
            <div class="gear-name">${UI.Helpers.escapeHtml(k.producent)} ${UI.Helpers.escapeHtml(k.model)}</div>
            <div class="gear-subtitle">
              <span>#${UI.Helpers.escapeHtml(k.numerKajaka || '–')}</span>
              <span>${UI.Helpers.escapeHtml(k.typ || '')}</span>
            </div>
          </div>

          <div class="status-chip ${statusClass}">
            <span class="status-dot"></span>
            <span>${statusLabel}</span>
          </div>
        </div>

        <div class="gear-meta" style="margin-top:6px;">
          ${isPrivate ? `<span class="badge private">Prywatny</span>` : `<span class="badge">Klubowy</span>`}
          ${k.basen ? `<span class="badge basen">Basen</span>` : ''}
          ${ownerInfo ? `<span class="meta-chip">${ownerInfo}</span>` : ''}
        </div>

        <div class="card-footer">
          <div class="user-info">${userInfo}</div>

          ${isAvailable
            ? `<button class="btn btn-primary" onclick="UI.Actions.rent('${UI.Helpers.encodeId(k.id)}')" ${canRent ? '' : 'disabled'}>
                 <span class="icon">➕</span>${rentLabel}
               </button>`
            : `<button class="btn btn-outline" onclick="UI.Actions.return('${UI.Helpers.encodeId(k.id)}')" ${isWorking ? '' : 'disabled'}>
                 <span class="icon">↩</span>Zwróć
               </button>`}
        </div>
      </article>
    `;
  }
};
</script>
