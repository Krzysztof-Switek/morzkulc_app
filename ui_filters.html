<div class="toolbar">
  <div class="filter-group">
    <button class="filter-btn active" id="filter-all" onclick="UI.Filters.setFilter('all')">
      Wszystkie
    </button>

    <button class="filter-btn" id="filter-available" onclick="UI.Filters.setFilter('available')">
      <span class="filter-dot"></span>
      Tylko dostępne
    </button>
  </div>

  <div class="toolbar-spacer"></div>

  <button class="refresh-btn" onclick="UI.Filters.reloadList()">
    <span class="refresh-icon"></span> Odśwież
  </button>
</div>
