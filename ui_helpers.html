<script>
window.UI = window.UI || {};

UI.Helpers = {

  updateStatus(text) {
    document.getElementById('status-line').textContent = text;
  },

  escapeHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  },

  encodeId(id) {
    return String(id).replace(/'/g, "\\'");
  }
};
</script>
